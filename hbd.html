<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎂 Happy Birthday, Claudia!</title>
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #ffdde1 0%, #fad0c4 50%, #fbc2eb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
            touch-action: manipulation;
            overflow-x: hidden;
            perspective: 1200px;
            position: relative;
        }

        /* ---------- FLOATING PARTICLES BACKGROUND ---------- */
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.5;
        }

        /* ---------- CARD WITH 3D TILT ---------- */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px 48px 32px 32px;
            padding: 28px 22px 32px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            will-change: transform;
            touch-action: none; /* prevent scroll on drag */
            transition: none; /* we handle animation via JS */
        }

        /* ---------- HEADER ---------- */
        .emoji-big {
            font-size: 64px;
            display: block;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        h1 {
            font-size: clamp(2.2rem, 12vw, 3.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #f093fb 100%);
            background-size: 300% 300%;
            animation: shimmer 4s infinite linear;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            line-height: 1.1;
            margin-bottom: 2px;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .sub-age {
            font-size: 1.2rem;
            font-weight: 600;
            color: #7c4a7c;
            background: rgba(255, 255, 255, 0.5);
            display: inline-block;
            padding: 4px 24px;
            border-radius: 40px;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .age-counter-display {
            font-size: 0.9rem;
            color: #a366a3;
            font-weight: 700;
            margin-top: -10px;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            line-height: 1.5;
        }

        /* ---------- CAKE BUTTON WITH DANCING CANDLE ---------- */
        .cake-wrapper {
            margin: 8px 0 16px;
            position: relative;
        }

        #cakeBtn {
            background: none;
            border: none;
            font-size: clamp(80px, 30vw, 130px);
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.3s;
            touch-action: manipulation;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 30px;
            border-radius: 120px;
            backdrop-filter: blur(4px);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            width: 100%;
            animation: glow 2s ease-in-out infinite alternate;
            transform-style: preserve-3d;
            position: relative;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 10px rgba(255, 180, 200, .4)) drop-shadow(0 8px 12px rgba(0, 0, 0, 0.1));
            }
            to {
                filter: drop-shadow(0 0 30px rgba(255, 180, 200, .9)) drop-shadow(0 8px 16px rgba(0, 0, 0, 0.15));
            }
        }

        #cakeBtn:active {
            transform: scale(0.92);
        }

        /* Candle flame */
        .flame {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            line-height: 1;
            animation: flicker 0.15s infinite alternate;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 200, 50, 0.8);
            transition: opacity 0.3s;
        }

        .flame.hidden {
            opacity: 0;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-3deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(3deg); }
        }

        .flame::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 6px;
            height: 20px;
            background: #f90;
            border-radius: 50%;
            filter: blur(8px);
            transform: translateX(-50%);
            opacity: 0.6;
            animation: glow-pulse 0.5s infinite alternate;
        }

        @keyframes glow-pulse {
            0% { opacity: 0.4; transform: translateX(-50%) scale(1); }
            100% { opacity: 0.8; transform: translateX(-50%) scale(1.2); }
        }

        .tap-hint {
            font-size: 0.85rem;
            color: #7a4b7a;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 16px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* ---------- HIDDEN MESSAGE ---------- */
        .hidden-message {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s ease, margin 0.3s ease;
            margin-top: 0;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 0 18px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .hidden-message.open {
            max-height: 1200px;
            opacity: 1;
            margin-top: 20px;
            padding: 22px 18px;
        }

        .hidden-message p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #3d2a3d;
            font-weight: 500;
        }

        .hidden-message .friend-note {
            font-style: italic;
            background: rgba(255, 215, 215, 0.3);
            padding: 14px 16px;
            border-radius: 20px;
            border-left: 4px solid #f5576c;
            margin: 12px 0;
            font-size: 0.98rem;
            text-align: left;
            line-height: 1.5;
        }

        .signoff {
            font-weight: 700;
            color: #b3415a;
            font-size: 1.1rem;
            margin-top: 10px;
            display: block;
        }

        /* ---------- FORTUNE ---------- */
        .fortune-section {
            margin-top: 22px;
            padding-top: 16px;
            border-top: 2px dashed rgba(180, 100, 140, 0.3);
        }

        .fortune-section h3 {
            font-size: 1rem;
            color: #5e3d5e;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        #fortuneBtn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 14px 24px;
            border-radius: 60px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s;
            touch-action: manipulation;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #fortuneBtn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(245, 87, 108, 0.3);
        }

        #fortuneDisplay {
            min-height: 60px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 16px 18px;
            margin-top: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d1b2d;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
            word-break: break-word;
        }

        .fortune-emoji {
            font-size: 1.6rem;
            margin-right: 10px;
        }

        /* ---------- GUESTBOOK ---------- */
        .guestbook-section {
            margin-top: 22px;
            padding-top: 16px;
            border-top: 2px dashed rgba(180, 100, 140, 0.3);
        }

        .guestbook-section h3 {
            font-size: 1rem;
            color: #5e3d5e;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .guestbook-input-group {
            display: flex;
            gap: 8px;
        }

        #guestInput {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            font-size: 0.95rem;
            font-weight: 500;
            color: #2d1b2d;
            outline: none;
            transition: border 0.2s;
        }

        #guestInput:focus {
            border-color: #f5576c;
        }

        #guestBtn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #guestBtn:active {
            transform: scale(0.95);
        }

        .wish-counter {
            font-size: 0.8rem;
            color: #7a4b7a;
            margin-top: 8px;
            font-weight: 600;
        }

        /* ---------- CONFETTI & BALLOONS ---------- */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .balloon {
            position: fixed;
            bottom: -100px;
            font-size: 40px;
            animation: floatUp 15s linear forwards;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes floatUp {
            from {
                transform: translateY(0) rotate(0deg);
            }
            to {
                transform: translateY(-130vh) rotate(20deg);
            }
        }

        /* ---------- SHOOTING STAR ---------- */
        .shooting-star {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px 4px rgba(255, 255, 255, 0.8);
            animation: shoot 1.2s ease-out forwards;
        }

        .star::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 100%;
            width: 120px;
            height: 2px;
            background: linear-gradient(to left, rgba(255, 255, 255, 0.8), transparent);
            transform: translateY(-50%);
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(80vw, 60vh) scale(0);
                opacity: 0;
            }
        }

        /* ---------- SPARKLE TRAIL ---------- */
        .sparkle {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            z-index: 9997;
            animation: sparkleFade 0.8s ease-out forwards;
        }

        @keyframes sparkleFade {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* ---------- AUDIO TOGGLE ---------- */
        #audioToggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            touch-action: manipulation;
        }

        #audioToggle:active {
            transform: scale(0.9);
        }

        #audioToggle.pulsing {
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0.4); }
            70% { box-shadow: 0 0 0 16px rgba(245, 87, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0); }
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 420px) {
            .card {
                padding: 20px 16px 24px;
                border-radius: 32px;
            }
            #cakeBtn {
                font-size: 80px;
                padding: 8px 10px;
            }
            .hidden-message p {
                font-size: 0.95rem;
            }
            #audioToggle {
                width: 48px;
                height: 48px;
                font-size: 22px;
                bottom: 16px;
                right: 16px;
            }
            .flame {
                font-size: 22px;
                top: -4px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Particles -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Confetti -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Audio Toggle -->
    <button id="audioToggle" aria-label="Toggle music">🔊</button>

    <div class="card" id="card3d">

        <span class="emoji-big">🎀</span>
        <h1>Happy Birthday<br />Claudia!</h1>
        <span class="sub-age">✨ Sweet 15 ✨</span>
        <div id="counterContainer">
            <!-- Patch Notes injected here -->
        </div>

        <div class="cake-wrapper">
            <button id="cakeBtn" aria-label="Tap the cake for a surprise">
                🎂
                <span class="flame" id="candleFlame">🔥</span>
            </button>
            <span class="tap-hint">👆 Tap the cake!</span>
        </div>

        <div id="revealMessage" class="hidden-message"></div>

        <div class="fortune-section">
            <h3>🔮 Your 15th Year Fortune</h3>
            <button id="fortuneBtn">✨ Pull a fortune ✨</button>
            <div id="fortuneDisplay">
                <span class="fortune-emoji">🌟</span> Tap to see your future!
            </div>
        </div>

        <div class="guestbook-section">
            <h3>💬 Leave a wish for Claudia</h3>
            <div class="guestbook-input-group">
                <input type="text" id="guestInput" placeholder="Type your wish..." maxlength="60" />
                <button id="guestBtn">🎈 Send</button>
            </div>
            <div class="wish-counter" id="wishCounter">✨ 0 wishes in the memory jar</div>
        </div>

    </div>

    <script>
        // ──────────────────────────────────────────────────────────────
        //  FLOATING PARTICLES BACKGROUND
        // ──────────────────────────────────────────────────────────────

        const ParticlesBackground = (function() {
            const canvas = document.getElementById('particlesCanvas');
            const ctx = canvas.getContext('2d');
            let W, H;
            let particles = [];
            const MAX_PARTICLES = 60;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const emojis = ['✦', '♥', '✧', '·', '⋆'];

            class BgParticle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.size = Math.random() * 12 + 8;
                    this.speedY = -0.1 - Math.random() * 0.2;
                    this.speedX = (Math.random() - 0.5) * 0.1;
                    this.opacity = Math.random() * 0.5 + 0.2;
                    this.char = emojis[Math.floor(Math.random() * emojis.length)];
                    this.dead = false;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.y < -20) {
                        this.y = H + 20;
                        this.x = Math.random() * W;
                    }
                    if (this.x < -20) this.x = W + 20;
                    if (this.x > W + 20) this.x = -20;
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.font = this.size + 'px sans-serif';
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = 'rgba(255,255,255,0.2)';
                    ctx.shadowBlur = 10;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.char, this.x, this.y);
                    ctx.restore();
                }
            }

            for (let i = 0; i < MAX_PARTICLES; i++) {
                particles.push(new BgParticle());
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);
                for (let p of particles) {
                    p.update();
                    p.draw();
                }
                requestAnimationFrame(animate);
            }
            animate();

            return { resize };
        })();

        // ──────────────────────────────────────────────────────────────
        //  CONFETTI ENGINE
        // ──────────────────────────────────────────────────────────────

        const ConfettiEngine = (function() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            let W = 0,
                H = 0;
            let particles = [];
            let animationId = null;
            let isRunning = false;
            let cleanupTimer = null;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function createParticle() {
                return {
                    x: Math.random() * W,
                    y: Math.random() * H - H * 0.2,
                    size: Math.random() * 8 + 4,
                    speedY: Math.random() * 6 + 4,
                    speedX: (Math.random() - 0.5) * 4,
                    color: 'hsl(' + (Math.random() * 360) + ', 90%, 65%)',
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    wobble: Math.random() * 10,
                    wobbleSpeed: Math.random() * 0.1 + 0.02,
                    phase: Math.random() * Math.PI * 2,
                    deceleration: 0.995,
                    gravity: 0.06,
                    dead: false,
                };
            }

            function updateParticle(p) {
                p.speedY *= p.deceleration;
                p.speedY += p.gravity;
                p.speedX *= p.deceleration;
                p.x += p.speedX + Math.sin(p.phase) * 0.3;
                p.y += p.speedY;
                p.phase += p.wobbleSpeed;
                p.rotation += p.rotSpeed;
                if (p.y > H + 20) p.dead = true;
                if (p.x < -20) p.x = W + 20;
                if (p.x > W + 20) p.x = -20;
            }

            function drawParticle(p) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.globalAlpha = 0.9;
                ctx.fillStyle = p.color;
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 6;
                const w = p.size;
                const h = p.size * 0.6;
                ctx.fillRect(-w / 2, -h / 2, w, h);
                ctx.restore();
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);
                let alive = false;
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    updateParticle(p);
                    drawParticle(p);
                    if (p.dead) {
                        particles.splice(i, 1);
                    } else {
                        alive = true;
                    }
                }
                if (alive || particles.length > 0) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    isRunning = false;
                    ctx.clearRect(0, 0, W, H);
                    animationId = null;
                }
            }

            return {
                launch: function(count) {
                    count = count || 120;
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }
                    const target = Math.max(count, 80);
                    while (particles.length < target) {
                        particles.push(createParticle());
                    }
                    if (particles.length > target + 30) {
                        particles.length = target;
                    }
                    const batch = Math.min(30, particles.length);
                    for (let i = 0; i < batch; i++) {
                        const p = particles[i];
                        p.y = -10 - Math.random() * 40;
                        p.x = Math.random() * W;
                        p.speedY = Math.random() * 8 + 5;
                        p.speedX = (Math.random() - 0.5) * 6;
                        p.dead = false;
                    }
                    if (!isRunning) {
                        isRunning = true;
                        animate();
                    }
                    if (cleanupTimer) clearTimeout(cleanupTimer);
                    cleanupTimer = setTimeout(function() {}, 5000);
                },
                stop: function() {
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }
                    isRunning = false;
                    particles = [];
                    ctx.clearRect(0, 0, W, H);
                    if (cleanupTimer) {
                        clearTimeout(cleanupTimer);
                        cleanupTimer = null;
                    }
                },
                resize: resize,
            };
        })();

        // ──────────────────────────────────────────────────────────────
        //  BALLOON SPAWNER
        // ──────────────────────────────────────────────────────────────

        const BalloonSpawner = (function() {
            const EMOJIS = ['🎈', '💖', '✨', '👑', '🎉'];

            function spawn(emoji, text) {
                const el = document.createElement('div');
                el.className = 'balloon';
                if (text) {
                    el.textContent = text;
                    el.style.fontSize = '20px';
                    el.style.background = 'rgba(255,255,255,0.7)';
                    el.style.padding = '8px 16px';
                    el.style.borderRadius = '30px';
                    el.style.backdropFilter = 'blur(4px)';
                    el.style.border = '1px solid rgba(255,255,255,0.5)';
                    el.style.boxShadow = '0 4px 20px rgba(0,0,0,0.1)';
                    el.style.whiteSpace = 'nowrap';
                } else {
                    el.textContent = emoji || EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
                    el.style.fontSize = Math.random() * 20 + 30 + 'px';
                }
                el.style.left = Math.random() * 90 + 'vw';
                const duration = Math.random() * 6 + 10;
                el.style.animationDuration = duration + 's';
                document.body.appendChild(el);
                const timeout = (duration + 1) * 1000;
                setTimeout(function() {
                    if (el.parentNode) el.parentNode.removeChild(el);
                }, timeout);
            }

            function spawnBatch(count) {
                count = count || 6;
                for (let i = 0; i < count; i++) {
                    setTimeout(function() {
                        spawn();
                    }, i * 300);
                }
            }

            return {
                spawn: spawn,
                spawnBatch: spawnBatch,
            };
        })();

        // ──────────────────────────────────────────────────────────────
        //  FORTUNE MANAGER
        // ──────────────────────────────────────────────────────────────

        const FortuneManager = (function() {
            const ALL_FORTUNES = [
                { emoji: '📚', text: 'You will absolutely crush that one subject you find tricky.' },
                { emoji: '🎵', text: 'Your new favorite song is dropping soon — and you\'ll hear it first!' },
                { emoji: '🍕', text: 'You will find a new snack combo that changes your life.' },
                { emoji: '😂', text: 'You\'ll laugh so hard this year that you snort. Own it.' },
                { emoji: '🌟', text: 'A new friend will enter your life and make it brighter.' },
                { emoji: '📸', text: 'You\'ll take a photo so good it becomes your new profile pic.' },
                { emoji: '🎮', text: 'You will unlock a new level IRL — confidence +10!' },
                { emoji: '☕', text: 'You\'ll master the art of making the perfect hot chocolate.' },
                { emoji: '💤', text: 'You\'ll get 9 hours of sleep one night and wake up a new person.' },
                { emoji: '👕', text: 'You\'ll find the perfect hoodie, and it will be on sale.' },
                { emoji: '🎭', text: 'Your hidden talent will finally get its moment to shine.' },
                { emoji: '🚀', text: 'This is YOUR year. Big things are loading... get ready!' },
                { emoji: '👑', text: 'Claudia, this fortune was rigged. You\'re the birthday girl. You automatically win today.' }
            ];

            let remaining = [];

            function reset() {
                remaining = ALL_FORTUNES.slice();
            }
            reset();

            function get() {
                if (remaining.length === 0) reset();
                const idx = Math.floor(Math.random() * remaining.length);

                remaining.splice(idx, 1);
                return result;
            }

            return {
                get: get,
                reset: reset,
                remainingCount: function() { return remaining.length; },
                all: function() { return ALL_FORTUNES; },
            };
        })();

        // ──────────────────────────────────────────────────────────────
        //  AUDIO MANAGER
        // ──────────────────────────────────────────────────────────────

        const AudioManager = (function() {
            let audio = null;
            let isPlaying = false;

            function getAudio() {
                if (!audio) {
                    audio = new Audio('birthday.mp3');
                    audio.loop = true;
                }
                return audio;
            }

            function play() {
                const el = getAudio();
                el.play().then(() => {
                    isPlaying = true;
                    updateUI();
                }).catch(function(err) {
                    console.log('Audio playback waiting for user interaction:', err);
                });
            }

            function pause() {
                if (audio) {
                    audio.pause();
                    isPlaying = false;
                    updateUI();
                }
            }

            function toggle() {
                if (isPlaying) {
                    pause();
                } else {
                    play();
                }
            }

            function stop() {
                if (audio) {
                    audio.pause();
                    audio.currentTime = 0;
                    isPlaying = false;
                    updateUI();
                }
            }

            function updateUI() {
                const btn = document.getElementById('audioToggle');
                if (btn) {
                    btn.textContent = isPlaying ? '🔊' : '🔇';
                    btn.classList.toggle('pulsing', isPlaying);
                }
            }

            return {
                play: play,
                pause: pause,
                toggle: toggle,
                stop: stop,
                isPlaying: function() { return isPlaying; },
            };
        })();

        // ──────────────────────────────────────────────────────────────
        //  TYPEWRITER ENGINE
        // ──────────────────────────────────────────────────────────────

        const Typewriter = (function() {
            let currentTimeout = null;

            function tokenize(html) {
                const tokens = [];
                let i = 0;
                while (i < html.length) {
                    if (html[i] === '<') {
                        const j = html.indexOf('>', i);
                        if (j === -1) break;
                        tokens.push(html.substring(i, j + 1));
                        i = j + 1;
                    } else {
                        tokens.push(html[i]);
                        i++;
                    }
                }
                return tokens;
            }

            function type(element, htmlContent, speed, onComplete) {
                speed = speed || 25;
                if (currentTimeout) {
                    clearTimeout(currentTimeout);
                    currentTimeout = null;
                }
                const tokens = tokenize(htmlContent);
                let index = 0;
                let fullHTML = '';

                function addNext() {
                    if (index < tokens.length) {
                        const token = tokens[index];
                        fullHTML += token;
                        element.innerHTML = fullHTML;
                        index++;
                        currentTimeout = setTimeout(addNext, speed);
                    } else {
                        currentTimeout = null;
                        if (onComplete) onComplete();
                    }
                }
                element.innerHTML = '';
                addNext();
            }

            function stop() {
                if (currentTimeout) {
                    clearTimeout(currentTimeout);
                    currentTimeout = null;
                }
            }

            return {
                type: type,
                stop: stop,
            };
        })();

        // ──────────────────────────────────────────────────────────────
        //  SHOOTING STAR
        // ──────────────────────────────────────────────────────────────

        function triggerShootingStar() {
            const container = document.createElement('div');
            container.className = 'shooting-star';
            document.body.appendChild(container);
            const count = 3;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = (Math.random() * 30) + '%';
                star.style.top = (Math.random() * 20) + '%';
                star.style.animationDelay = (i * 0.3) + 's';
                container.appendChild(star);
            }
            setTimeout(() => {
                container.remove();
            }, 2500);
        }

        // ──────────────────────────────────────────────────────────────
        //  SPARKLE TRAIL
        // ──────────────────────────────────────────────────────────────

        const SparkleTrail = (function() {
            let enabled = true;
            let timer = null;

            function createSparkle(x, y) {
                const emojis = ['⭐', '✨', '💫', '🌟', '🎇'];
                const el = document.createElement('div');
                el.className = 'sparkle';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                const tx = (Math.random() - 0.5) * 120;
                const ty = (Math.random() - 0.5) * 120 - 40;
                el.style.setProperty('--tx', tx + 'px');
                el.style.setProperty('--ty', ty + 'px');
                el.style.fontSize = Math.random() * 16 + 14 + 'px';
                document.body.appendChild(el);
                setTimeout(() => {
                    if (el.parentNode) el.parentNode.removeChild(el);
                }, 900);
            }

            function onMove(e) {
                if (!enabled) return;
                if (timer) return;
                timer = setTimeout(() => { timer = null; }, 60);
                let x, y;
                if (e.touches) {
                    x = e.touches[0].clientX;
                    y = e.touches[0].clientY;
                } else {
                    x = e.clientX;
                    y = e.clientY;
                }
                const card = document.getElementById('card3d');
                const rect = card.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    createSparkle(x, y);
                }
            }

            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchmove', onMove, { passive: true });

            return { enable: function() { enabled = true; }, disable: function() { enabled = false; } };
        })();

        // ──────────────────────────────────────────────────────────────
        //  3D TILT – SUPER RELIABLE (fixed for iOS)
        // ──────────────────────────────────────────────────────────────

        const Tilt3D = (function() {
            const card = document.getElementById('card3d');
            const maxRotate = 12;
            let currentRotX = 0,
                currentRotY = 0;
            let targetRotX = 0,
                targetRotY = 0;
            let useGyro = false;
            let gyroEnabled = false;
            let animationRunning = false;

            // ---- Smooth animation loop ----
            function animateTilt() {
                if (!animationRunning) {
                    animationRunning = true;
                    (function loop() {
                        const dx = targetRotX - currentRotX;
                        const dy = targetRotY - currentRotY;
                        if (Math.abs(dx) > 0.01 || Math.abs(dy) > 0.01) {
                            currentRotX += dx * 0.08;
                            currentRotY += dy * 0.08;
                            card.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
                            requestAnimationFrame(loop);
                        } else {
                            currentRotX = targetRotX;
                            currentRotY = targetRotY;
                            card.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
                            animationRunning = false;
                        }
                    })();
                }
            }

            // ---- Set target rotation and trigger animation ----
            function setTilt(xDeg, yDeg) {
                targetRotX = Math.min(Math.max(xDeg, -maxRotate), maxRotate);
                targetRotY = Math.min(Math.max(yDeg, -maxRotate), maxRotate);
                animateTilt();
            }

            // ---- Reset to center ----
            function resetTilt() {
                if (useGyro) return; // gyro overrides
                setTilt(0, 0);
            }

            // ---- Touch / mouse drag ----
            function onPointerMove(e) {
                if (useGyro) return; // gyro takes over
                let x, y;
                if (e.touches) {
                    x = e.touches[0].clientX;
                    y = e.touches[0].clientY;
                } else {
                    x = e.clientX;
                    y = e.clientY;
                }
                const rect = card.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = (x - cx) / (rect.width / 2);
                const dy = (y - cy) / (rect.height / 2);
                const rotY = dx * maxRotate;
                const rotX = -dy * maxRotate;
                setTilt(rotX, rotY);
            }

            // ---- Gyroscope handler ----
            function onDeviceOrientation(e) {
                if (!e.beta && !e.gamma) return;
                const beta = e.beta || 0;
                const gamma = e.gamma || 0;
                // Map beta (front-back) and gamma (left-right) to rotations
                // For portrait mode, use gamma for Y and beta for X
                const rotY = Math.min(Math.max((gamma / 30) * maxRotate, -maxRotate), maxRotate);
                const rotX = Math.min(Math.max((beta / 30) * maxRotate, -maxRotate), maxRotate);
                setTilt(rotX, rotY);
            }

            // ---- Request gyro permission (iOS) ----
            function requestGyro() {
                if (gyroEnabled) return;
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(response => {
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', onDeviceOrientation);
                            useGyro = true;
                            gyroEnabled = true;
                            console.log('Gyro enabled (iOS)');
                        } else {
                            console.log('Gyro permission denied');
                        }
                    }).catch(err => console.log('Gyro request error:', err));
                } else if (window.DeviceOrientationEvent) {
                    // Android / others
                    window.addEventListener('deviceorientation', onDeviceOrientation);
                    useGyro = true;
                    gyroEnabled = true;
                    console.log('Gyro enabled (Android)');
                } else {
                    console.log('DeviceOrientation not supported');
                }
            }

            // ---- Attach touch/mouse events to the card ----
            card.addEventListener('touchmove', onPointerMove, { passive: true });
            card.addEventListener('mousemove', onPointerMove);
            card.addEventListener('mouseleave', resetTilt);
            // For touch end, we don't reset to keep last position – feels more natural

            // ---- Expose public API ----
            return {
                requestGyro: requestGyro,
                reset: resetTilt,
                isGyroActive: function() { return useGyro; }
            };
        })();

        // ──────────────────────────────────────────────────────────────
        //  SHAKE DETECTOR
        // ──────────────────────────────────────────────────────────────

        const ShakeDetector = (function() {
            let lastX = 0,
                lastY = 0,
                lastZ = 0;
            let lastTime = 0;
            let cooldown = false;
            const THRESHOLD = 15;
            const COOLDOWN_MS = 3000;

            function handleMotion(e) {
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;
                const x = acc.x || 0,
                    y = acc.y || 0,
                    z = acc.z || 0;
                const now = Date.now();
                const dt = now - lastTime;
                if (dt > 100) {
                    const dx = x - lastX,
                        dy = y - lastY,
                        dz = z - lastZ;
                    const magnitude = Math.sqrt(dx * dx + dy * dy + dz * dz);
                    if (magnitude > THRESHOLD && !cooldown) {
                        cooldown = true;
                        setTimeout(() => { cooldown = false; }, COOLDOWN_MS);
                        ConfettiEngine.launch(80);
                        BalloonSpawner.spawnBatch(4);
                        triggerShootingStar();
                        const f = FortuneManager.get();
                        const fortuneDisplay = document.getElementById('fortuneDisplay');
                        fortuneDisplay.innerHTML = '<span class="fortune-emoji">' + f.emoji + '</span> ' + f.text;
                    }
                    lastX = x;
                    lastY = y;
                    lastZ = z;
                    lastTime = now;
                }
            }

            function init() {
                if (window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', handleMotion, false);
                } else {
                    console.log('DeviceMotion not supported');
                }
            }

            return { init: init };
        })();

        // ──────────────────────────────────────────────────────────────
        //  MEMORY JAR
        // ──────────────────────────────────────────────────────────────

        const MemoryJar = (function() {
            const STORAGE_KEY = 'claudia_wishes';
            let wishes = [];

            function load() {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    if (data) {
                        wishes = JSON.parse(data);
                    } else {
                        wishes = [];
                    }
                } catch (e) {
                    wishes = [];
                }
                updateCounter();
            }

            function save() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(wishes));
                } catch (e) { /* ignore */ }
                updateCounter();
            }

            function addWish(text) {
                if (!text) return false;
                wishes.push(text);
                save();
                BalloonSpawner.spawn(null, text);
                ConfettiEngine.launch(20);
                return true;
            }

            function getAll() {
                return wishes.slice();
            }

            function updateCounter() {
                const el = document.getElementById('wishCounter');
                if (el) {
                    el.textContent = '✨ ' + wishes.length + ' wishes in the memory jar';
                }
            }

            function respawnAll() {
                const all = getAll();
                for (let wish of all) {
                    setTimeout(() => {
                        BalloonSpawner.spawn(null, wish);
                    }, Math.random() * 2000);
                }
            }

            return {
                load: load,
                save: save,
                addWish: addWish,
                getAll: getAll,
                respawnAll: respawnAll,
            };
        })();

        // ──────────────────────────────────────────────────────────────
        //  CANDLE FLAME
        // ──────────────────────────────────────────────────────────────

        const CandleController = (function() {
            const flame = document.getElementById('candleFlame');
            let isBlown = false;

            function blowOut() {
                if (isBlown) return;
                isBlown = true;
                flame.classList.add('hidden');
                setTimeout(() => {
                    isBlown = false;
                    flame.classList.remove('hidden');
                }, 1500);
            }

            return {
                blowOut: blowOut,
                isBlown: function() { return isBlown; },
            };
        })();

        // ──────────────────────────────────────────────────────────────
        //  MAIN
        // ──────────────────────────────────────────────────────────────

        (function main() {

            // ---- DOM refs ----
            const cakeBtn = document.getElementById('cakeBtn');
            const messageDiv = document.getElementById('revealMessage');
            const fortuneBtn = document.getElementById('fortuneBtn');
            const fortuneDisplay = document.getElementById('fortuneDisplay');
            const counterContainer = document.getElementById('counterContainer');
            const audioToggle = document.getElementById('audioToggle');
            const guestInput = document.getElementById('guestInput');
            const guestBtn = document.getElementById('guestBtn');

            // ---- age counter ----
            const ageEl = document.createElement('div');
            ageEl.className = 'age-counter-display';
            ageEl.innerHTML = `
                🎮 Claudia v15.0 • Patch Notes:<br>
                + More awesome<br>
                + More memories<br>
                + More adventures<br>
                - Fourteen-year-old bugs fixed
            `;
            counterContainer.appendChild(ageEl);

            // ---- birthday message ----
            const MESSAGE_HTML = `
                <p>🎉 <strong>HAPPY 15TH BIRTHDAY!</strong> 🎉</p>
                <div class="friend-note">
                    Even though we've never met in person, I'm so glad we crossed paths online.
                    You're genuinely one of the coolest, funniest people I know.
                    I hope your day is filled with cake, laughs, and zero homework stress!
                    Here's to an epic year ahead. 🥳
                </div>
                <div class="friend-note">
                    You've officially survived 15 years on this chaotic planet.
                    That's 15 years of memories, weird moments, bad jokes,
                    good friends, and somehow making life brighter for the
                    people around you.
                    <br><br>
                    I hope this year gives you more reasons to smile than
                    stress, more wins than worries, and enough happiness to
                    fill a thousand birthday cakes.
                </div>
                <span class="signoff">— Your friend, Eldad 🤝</span>
            `;

            // ---- initial fortune ----
            const initialFortune = FortuneManager.get();
            fortuneDisplay.innerHTML =
                '<span class="fortune-emoji">' + initialFortune.emoji + '</span> ' + initialFortune.text;

            // ---- helpers ----
            function triggerCelebration(intensity) {
                intensity = intensity || 1;
                const confettiCount = Math.round(120 * intensity);
                const balloonCount = Math.round(6 * intensity);
                ConfettiEngine.launch(confettiCount);
                BalloonSpawner.spawnBatch(balloonCount);
                triggerShootingStar();
            }

            // ---- any tap on the card or buttons will request gyro ----
            function requestGyroOnTap() {
                if (!Tilt3D.isGyroActive()) {
                    Tilt3D.requestGyro();
                }
            }
            document.addEventListener('click', requestGyroOnTap);
            document.addEventListener('touchstart', requestGyroOnTap, { passive: true });

            // ---- cake tap ----
            cakeBtn.addEventListener('click', function(e) {
                e.preventDefault();

                // Blow candle
                CandleController.blowOut();

                // play audio
                if (!AudioManager.isPlaying()) {
                    AudioManager.play();
                }

                // reveal message
                messageDiv.classList.add('open');
                Typewriter.stop();
                Typewriter.type(messageDiv, MESSAGE_HTML, 5);

                triggerCelebration(1.5);

                // visual feedback
                this.style.transform = 'scale(0.9)';
                setTimeout(() => { this.style.transform = 'scale(1)'; }, 150);

                // fresh fortune
                const f = FortuneManager.get();
                fortuneDisplay.innerHTML = '<span class="fortune-emoji">' + f.emoji + '</span> ' + f.text;
            });

            // ---- fortune button ----
            fortuneBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const f = FortuneManager.get();
                fortuneDisplay.innerHTML = '<span class="fortune-emoji">' + f.emoji + '</span> ' + f.text;
                ConfettiEngine.launch(50);
                BalloonSpawner.spawn();
                triggerShootingStar();
                this.style.transform = 'scale(0.95)';
                setTimeout(() => { this.style.transform = 'scale(1)'; }, 120);
            });

            // ---- audio toggle ----
            audioToggle.addEventListener('click', function(e) {
                AudioManager.toggle();
            });

            // ---- guestbook ----
            function sendWish() {
                const text = guestInput.value.trim();
                if (!text) return;
                MemoryJar.addWish(text);
                guestInput.value = '';
                guestInput.focus();
            }
            guestBtn.addEventListener('click', sendWish);
            guestInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendWish();
                }
            });

            // ---- load memory jar ----
            MemoryJar.load();
            setTimeout(() => {
                MemoryJar.respawnAll();
            }, 1500);

            // ---- init shake ----
            ShakeDetector.init();

            // ---- auto intro ----
            window.addEventListener('load', function() {
                setTimeout(() => {
                    ConfettiEngine.launch(60);
                    setTimeout(() => ConfettiEngine.stop(), 3000);
                }, 600);
                setInterval(() => BalloonSpawner.spawn(), 4000);
            });

            // ---- cleanup ----
            window.addEventListener('beforeunload', function() {
                ConfettiEngine.stop();
                AudioManager.stop();
                Typewriter.stop();
            });

        })();
    </script>
